<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Bridge - 주문 목록</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/list.css}">
</head>
<body>
    <div class="header">
        <h1><a th:href="@{/orders}" style="text-decoration:none;color:inherit">Order Bridge</a></h1>
        <div class="header-right">
            <a th:href="@{/claims}">클레임 목록</a>
            <a th:href="@{/logout}">로그아웃</a>
        </div>
    </div>
    <div class="container">
        <form class="search-form" method="get" th:action="@{/orders}">
            <select name="channelType">
                <option value="">전체 채널</option>
                <option th:each="type : ${channelTypes}" th:value="${type}" th:text="${type}"
                        th:selected="${condition.channelType == type}"></option>
            </select>
            <select name="status">
                <option value="">전체 상태</option>
                <option th:each="s : ${orderStatuses}" th:value="${s}" th:text="${s.label}"
                        th:selected="${condition.status == s}"></option>
            </select>
            <input type="date" name="startDate" th:value="${condition.startDate}" placeholder="시작일">
            <input type="date" name="endDate" th:value="${condition.endDate}" placeholder="종료일">
            <button type="submit" class="btn">검색</button>
        </form>

        <div class="summary">
            <div class="summary-card">
                <div class="label">전체 주문</div>
                <div class="value" th:text="${page.totalElements}">0</div>
            </div>
        </div>

        <table th:if="${!#lists.isEmpty(orders)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>채널 주문번호</th>
                    <th>채널</th>
                    <th>주문자</th>
                    <th>총액</th>
                    <th>상태</th>
                    <th>주문일시</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}" th:data-id="${order.id}" th:onclick="|location.href='/orders/${order.id}'|">
                    <td th:text="${order.id}"></td>
                    <td th:text="${order.channelOrderNo}"></td>
                    <td th:text="${order.channel.type}"></td>
                    <td th:text="${order.ordererName}"></td>
                    <td th:text="|${#numbers.formatInteger(order.totalAmount, 1, 'COMMA')}원|"></td>
                    <td><span class="status" th:classappend="'status-' + ${order.status}" th:text="${order.status.label}"></span></td>
                    <td th:text="${#temporals.format(order.orderedAt, 'yyyy-MM-dd HH:mm')}"></td>
                </tr>
            </tbody>
        </table>

        <div class="pagination" th:if="${page.totalPages > 1}">
            <a th:if="${!page.first}"
               th:href="@{/orders(page=${page.number - 1}, size=${page.size},
                         channelType=${condition.channelType}, status=${condition.status},
                         startDate=${condition.startDate}, endDate=${condition.endDate})}">&laquo; 이전</a>

            <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                <a th:classappend="${i == page.number} ? 'active'"
                   th:href="@{/orders(page=${i}, size=${page.size},
                             channelType=${condition.channelType}, status=${condition.status},
                             startDate=${condition.startDate}, endDate=${condition.endDate})}"
                   th:text="${i + 1}"></a>
            </th:block>

            <a th:if="${!page.last}"
               th:href="@{/orders(page=${page.number + 1}, size=${page.size},
                         channelType=${condition.channelType}, status=${condition.status},
                         startDate=${condition.startDate}, endDate=${condition.endDate})}">다음 &raquo;</a>
        </div>

        <div th:if="${#lists.isEmpty(orders)}" class="empty-msg">
            수집된 주문이 없습니다.
        </div>
    </div>
    <script th:src="@{/js/sse.js}"></script>
</body>
</html>
